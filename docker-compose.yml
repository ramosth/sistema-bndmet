version: '3.8'

services:
  # ── Banco de dados PostgreSQL com TimescaleDB ────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: bndmet-postgres
    environment:
      POSTGRES_DB: bndmet
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: senha123
      POSTGRES_HOST_AUTH_METHOD: trust
      PGTZ: UTC
      TZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d/
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d bndmet"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
      -c timezone=UTC
      -c log_timezone=UTC

  # ── Adminer — interface web para o banco ────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: bndmet-adminer
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    environment:
      TZ: UTC
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: nette

  # ── Backend Node.js ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bndmet-backend
    ports:
      - "3001:3001"
    environment:
      TZ: UTC
      NODE_ENV: production
      PORT: 3001
      # DATABASE_URL aponta para o container postgres (nome do serviço = host)
      DATABASE_URL: "postgresql://admin:senha123@postgres:5432/bndmet?schema=public&timezone=UTC"
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
      BNDMET_API_KEY: ${BNDMET_API_KEY}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    # Healthcheck do próprio backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: bndmet-network